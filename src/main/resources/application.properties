spring.application.name=ip-check-api
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

springdoc.swagger-ui.path=/docs

ip-intelligence.provider=${IP_INTELLIGENCE_PROVIDER:proxycheck}
ip-intelligence.base-url=${IP_INTELLIGENCE_BASE_URL:https://proxycheck.io/v2}
ip-intelligence.api-key=${IP_INTELLIGENCE_API_KEY:}
ip-intelligence.cache-duration-minutes=${IP_INTELLIGENCE_CACHE_DURATION_MINUTES:60}

ip-import.max-csv-file-size-bytes=1048576